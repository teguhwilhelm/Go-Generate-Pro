<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Generate Pro</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker terdaftar!', reg))
            .catch(err => console.log('Gagal daftar Service Worker', err));
        });
      }

      const firebaseConfig = {
        apiKey: "AIzaSyAV5fZiGX-YygqUX0PZbkCbiQ-kt1b4HUw",
        authDomain: "jmo-gen.firebaseapp.com",
        databaseURL: "https://jmo-gen-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "jmo-gen",
        storageBucket: "jmo-gen.firebasestorage.app",
        messagingSenderId: "1035818626321",
        appId: "1:1035818626321:web:241032832ee089462170b0"
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        * {
            -webkit-tap-highlight-color: transparent !important;
            -webkit-touch-callout: none;
        }

        :root { 
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-1: #b5179e; 
            --accent-2: #7209b7; 
            --neon-cyan: #4cc9f0;
            --text-main: #e0e0e0;
            --success: #06d6a0;
        }

        @keyframes slowPulse {
            0% { box-shadow: 0 0 8px var(--neon-cyan); border-color: var(--neon-cyan); }
            50% { box-shadow: 0 0 20px var(--neon-cyan); border-color: #fff; }
            100% { box-shadow: 0 0 8px var(--neon-cyan); border-color: var(--neon-cyan); }
        }

        .container:focus-within, 
        .history-wrapper:focus-within, 
        #auth-screen:focus-within,
        .editable-box:focus, 
        .auth-input:focus, 
        textarea:focus, 
        .search-box:focus, 
        .sync-field input:focus {
            outline: none !important;
            animation: slowPulse 2s infinite ease-in-out;
            transition: all 0.3s ease;
        }

        body { 
            font-family: 'Rajdhani', sans-serif; 
            background: var(--bg);
            color: var(--text-main); 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            min-height: 100vh;
        }

        @keyframes neonPulse {
            0% { box-shadow: 0 0 5px var(--accent-1); }
            50% { box-shadow: 0 0 15px var(--accent-1); }
            100% { box-shadow: 0 0 5px var(--accent-1); }
        }
        @keyframes titleFloat {
            0%, 100% { transform: translateY(0) scale(1); filter: brightness(1); }
            50% { transform: translateY(-5px) scale(1.02); filter: brightness(1.3); }
        }

        .moving-title { 
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--neon-cyan), var(--accent-1));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: titleFloat 3s ease-in-out infinite;
        }
        .auth-btn:active {
            transform: scale(0.95);
            filter: brightness(1.2);
            box-shadow: 0 0 25px var(--accent-1);
            transition: 0.1s;
        }
        .auth-btn {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            background: linear-gradient(45deg, var(--accent-2), var(--accent-1));
            color: white; 
            font-weight: bold; 
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(181, 23, 158, 0.3);
        }
        .auth-btn:hover {
            letter-spacing: 1px;
            box-shadow: 0 0 20px var(--accent-2);
        }

        #auth-screen { 
            width: 100%; 
            max-width: 380px; 
            margin-top: 60px; 
            background: var(--glass); 
            backdrop-filter: blur(15px);
            padding: 35px; 
            border-radius: 20px; 
            border: 1px solid var(--glass-border);
            text-align: center; 
            box-sizing: border-box;
        }
        .auth-input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.3);
            color: white; 
            outline: none; 
            box-sizing: border-box;
        }
        .auth-link { margin-top: 15px; font-size: 13px; color: var(--neon-cyan); cursor: pointer; }

        .sidebar { 
            height: 100%; width: 0; position: fixed; z-index: 2001; top: 0; left: 0; 
            background: #0f0f12; overflow-x: hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            padding-top: 60px; border-right: none; 
        }
        .sidebar-content { padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .sidebar-user-info { font-size: 14px; font-weight: bold; color: var(--neon-cyan); border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .btn-off-side { background: #ff4757; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        .overlay-bg { display: none; position: fixed; width: 100%; height: 100%; top: 0; left: 0; background: rgba(0,0,0,0.6); z-index: 2000; backdrop-filter: blur(3px); }

        .header-row { display: flex; align-items: center; width: 100%; border-bottom: 1px solid var(--neon-cyan); margin-bottom: 20px; padding-bottom: 10px; }
        .openbtn { font-size: 24px; cursor: pointer; color: var(--neon-cyan); padding-right: 15px; user-select: none; }
        
        .container, .history-wrapper { 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            width: 100%; 
            max-width: 450px; 
            border-radius: 20px; 
            padding: 20px; 
            border: 1px solid var(--glass-border);
            box-sizing: border-box; 
            margin-bottom: 20px;
        }
        h2 { flex-grow: 1; text-align: center; margin: 0; font-size: 1.1rem; } 
        
        .sync-field { margin-bottom: 15px; display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 12px; color: var(--neon-cyan); }
        .sync-field input { 
            padding: 6px; border-radius: 8px; border: 1px solid var(--glass-border); 
            width: 70px; text-align: center; background: rgba(0,0,0,0.3); 
            color: var(--neon-cyan); font-weight: bold; outline: none;
        }

        .template-select { 
            background: #000; color: var(--neon-cyan); border: 1px solid var(--glass-border); 
            padding: 4px 8px; border-radius: 8px; font-size: 11px; outline: none; cursor: pointer; margin-right: 95px; width: 90px; }

        textarea { 
            width: 100%; min-height: 110px; border-radius: 12px; border: 1px solid var(--glass-border); 
            padding: 12px; background: rgba(0,0,0,0.2); color: #fff; font-size: 14px; 
            outline: none; resize: none; box-sizing: border-box; margin-bottom: 15px;
        }
        .btn-gen { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; margin-bottom: 20px; 
            cursor: pointer; font-weight: bold; color: white; background: linear-gradient(90deg, #4cc9f0, #4361ee);
            text-transform: uppercase; font-family: 'Orbitron', sans-serif; animation: neonPulse 3s infinite;
        }

        .output-container { margin-top: 15px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .label { font-weight: bold; font-size: 10px; color: var(--neon-cyan); letter-spacing: 1px; }
        .btn-wa { border: none; padding: 6px 12px; border-radius: 8px; font-size: 10px; cursor: pointer; color: white; background: var(--success); font-weight: bold;}

        .editable-box { 
            width: 100%; padding: 15px; border-radius: 12px; font-size: 13px; line-height: 1.5; 
            min-height: 60px; white-space: pre-wrap; box-sizing: border-box; outline: none; border: 1px solid var(--glass-border);
        }
        .out-dark { background: #000; color: var(--neon-cyan); font-family: 'Consolas', monospace; border-left: 4px solid var(--neon-cyan); }
        .out-light { background: #fff; color: #b5179e; border-left: 4px solid var(--accent-1);font-family: 'Consolas',monospace; }

        .history-wrapper { border-top: 4px solid var(--accent-1); }
        .history-header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        .search-box { 
            width: 100%; padding: 10px 15px; border-radius: 12px; border: 1px solid var(--glass-border); 
            background: rgba(0,0,0,0.3); color: white; font-size: 12px; outline: none; margin-bottom: 15px; box-sizing: border-box;
        }
        
        .history-scroll-area { max-height: 350px; overflow-y: auto; }
        .history-item { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
            border-radius: 12px; margin-bottom: 10px; overflow: hidden;
            user-select: none; 
        }
        .history-item-header { 
            padding: 12px; cursor: pointer; font-weight: bold; display: flex; 
            justify-content: space-between; align-items: center; font-size: 12px; 
        }
        .history-content { display: none; padding: 12px; font-size: 12px; border-top: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); }
        .history-content pre { background: #000; padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border); font-size: 10px; color: var(--neon-cyan); max-height: 120px; overflow-y: auto; }
        .btn-wa-small { width: 100%; border: none; padding: 8px; border-radius: 8px; font-size: 10px; background: var(--success); color: white; font-weight: bold; margin-bottom: 8px; }
        .badge-tg { background: var(--accent-2); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-right: 8px; }
        .time-ago { font-size: 9px; color: #888; }

        .select-mode-check { display: none; margin-right: 10px; width: 16px; height: 16px; accent-color: var(--neon-cyan); }
        .history-item.selecting .select-mode-check { display: inline-block; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h2 id="auth-title" class="moving-title">Login Go-Gen</h2>
    <div style="margin-top: 25px;">
        <input type="email" id="email" class="auth-input" placeholder="Email">
        <div style="position: relative; width: 100%;">
            <input type="password" id="pass" class="auth-input" placeholder="Password" style="padding-right: 60px;">
            <span id="togglePass" onclick="togglePasswordVisibility()" 
                  style="position: absolute; right: 15px; top: 18px; cursor: pointer; font-size: 11px; color: var(--neon-cyan); font-weight: bold;">
                SHOW
            </span>
        </div>
        <button class="auth-btn" id="main-auth-btn" onclick="handleAuth()">Login</button>
        <p class="auth-link" onclick="toggleAuth()" id="toggle-text">Request Access (Register)</p>
    </div>
</div>

<div id="sideOverlay" class="overlay-bg" onclick="closeNav()"></div>
<div id="mySidebar" class="sidebar">
    <div class="sidebar-content">
        <div id="user-display-side" class="sidebar-user-info">User : </div>
        <button class="btn-off-side" onclick="logout()">Logout</button>
    </div>
</div>

<div id="main-content" style="display: none; width: 100%; flex-direction: column; align-items: center;">
    <div class="container">
        <div class="header-row">
            <span class="openbtn" onclick="openNav()">☰</span>
            <h2 class="moving-title">Go-Generate Pro</h2>
        </div>

        <div class="sync-field">
            <span>Label :</span>
            <input type="text" id="noTG" placeholder="Judul/Kode">
        </div>
        <textarea id="inputData" placeholder="Feed Raw Data Here..." oninput="handleInput(this)"></textarea>
        <button id="genBtn" class="btn-gen" onclick="generate()">Generate ✨</button>
        
        <div class="output-container">
            <div class="label-row">
                <span class="label">Format 1</span>
                <select id="selTemp" class="template-select" onchange="generate()">
                    <option value="ori">🦆 Duck</option>
                    <option value="1">💎 Diamond</option>
                    <option value="2">✨ Glow</option>
                    <option value="3">🪽 Wings</option>
                    <option value="4">🦚 Peacock</option>
                    <option value="5">🐦‍🔥 Phoenix</option>
                </select>
                <button class="btn-wa" onclick="sendWA('out1')">Send WA</button>
            </div>
            <div id="out1" class="editable-box out-dark" contenteditable="true"></div>
        </div>

        <div class="output-container">
            <div class="label-row"><span class="label">Format 2</span><button class="btn-wa" onclick="sendWA('out2')">Send WA</button></div>
            <div id="out2" class="editable-box out-light" contenteditable="true"></div>
        </div>
    </div>

    <div class="history-wrapper">
        <div class="history-header-top">
            <span id="history-label" style="font-weight:bold; color:var(--neon-cyan); font-size: 13px;">History</span>
            <button class="btn-clear-all" id="btn-del-main" onclick="handleMainDelete()" style="background:transparent; border:1px solid #ff4d4d; color:#ff4d4d; padding:4px 10px; border-radius:6px; cursor:pointer; font-size:10px;">Delete</button>
        </div>
        <input type="text" id="searchHistory" class="search-box" placeholder="Search NIK/Nama..." onkeyup="renderHistory()">
        
        <div class="history-scroll-area">
            <div id="historyList"></div>
        </div>
    </div>
</div>

<script>
    function openNav() { document.getElementById("mySidebar").style.width = "250px"; document.getElementById("sideOverlay").style.display = "block"; }
    function closeNav() { document.getElementById("mySidebar").style.width = "0"; document.getElementById("sideOverlay").style.display = "none"; }
    
    let isLogin = true;
    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "Access Portal" : "Register User";
        document.getElementById('main-auth-btn').innerText = isLogin ? "Login" : "Register";
        document.getElementById('toggle-text').innerText = isLogin ? "Request Access (Register)" : "Back to Login";
    }

    function togglePasswordVisibility() {
        const passInput = document.getElementById('pass');
        const toggleBtn = document.getElementById('togglePass');
        if (passInput.type === "password") {
            passInput.type = "text";
            toggleBtn.innerText = "HIDE";
        } else {
            passInput.type = "password";
            toggleBtn.innerText = "SHOW";
        }
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || !pass) return alert("Fill credentials!");
        if(isLogin) { 
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => { localStorage.setItem('saved_user_email', email); })
                .catch(e => alert(e.message)); 
        } 
        else { auth.createUserWithEmailAndPassword(email, pass).then(() => alert("Access Granted!")).catch(e => alert(e.message)); }
    }
    function logout() { closeNav(); auth.signOut(); }

    let idleTimer;
    const INACTIVITY_LIMIT = 30 * 60 * 1000; 

    function resetIdleTimer() {
        clearTimeout(idleTimer);
        if (auth.currentUser) {
            idleTimer = setTimeout(() => {
                alert("Sesi berakhir karena tidak ada aktivitas.");
                logout();
            }, INACTIVITY_LIMIT);
        }
    }

    ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(evt => {
        window.addEventListener(evt, resetIdleTimer, true);
    });

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('user-display-side').innerText =  user.email.split('@')[0].toUpperCase();
            renderHistory();
            resetIdleTimer();
        } else {
            document.getElementById('auth-screen').style.display = 'block';
            document.getElementById('main-content').style.display = 'none';
            clearTimeout(idleTimer);
            const savedEmail = localStorage.getItem('saved_user_email');
            if (savedEmail) { document.getElementById('email').value = savedEmail; }
        }
    });

    let rawCache = { tg: "", nama: "-", nik: "-" };
    let selectedNIKs = []; 
    let pressTimer;

    function handleInput(el) {
        el.style.height = "auto"; el.style.height = (el.scrollHeight) + "px";
        if (el.value.trim() === "") {
            document.getElementById('out1').innerText = ""; document.getElementById('out2').innerText = "";
            rawCache = { tg: "", nama: "-", nik: "-" };
        }
    }

    function formatTitik(val) {
        if(!val) return "0";
        let num = val.toString().replace(/\D/g, "");
        return num ? num.replace(/\B(?=(\d{3})+(?!\d))/g, ".") : "0";
    }

    function timeAgo(date) {
        const seconds = Math.floor((new Date() - new Date(date)) / 1000);
        if (seconds < 60) return "Just now";
        const minutes = Math.floor(seconds / 60); if (minutes < 60) return minutes + "m";
        const hours = Math.floor(minutes / 60); if (hours < 24) return hours + "h";
        return Math.floor(hours / 24) + "d";
    }

    function generate() {
        const input = document.getElementById('inputData').value;
        const noTG = document.getElementById('noTG').value;
        const sel = document.getElementById('selTemp').value;
        const btn = document.getElementById('genBtn');
        if (!input.trim()) return;

        let nama = "-", nik = "-", kpj = "-", thn = "-", kab = "-", kec = "-", kel = "-", lasik = "0", labelKartu = "TUNGGAL";
        const lines = input.split('\n').filter(l => l.trim() !== ""); 
        
        lines.forEach((line, index) => {
            let uLine = line.toUpperCase().trim();
            let content = line.includes(":") ? line.split(":")[1].trim() : line.trim();

            let matchNIK = line.match(/\d{16}/);
            if (matchNIK) { nik = matchNIK[0]; } 

            let matchKPJ = line.match(/[A-Z0-9]{11}/);
            if (matchKPJ) { 
                kpj = matchKPJ[0]; 
                if (nama === "-") {
                   if (lines[index+1] && !lines[index+1].match(/\d/) && !lines[index+1].includes(":")) {
                       nama = lines[index+1].trim().toUpperCase();
                   } else if (lines[index-1] && !lines[index-1].match(/\d/) && !lines[index-1].includes(":")) {
                       nama = lines[index-1].trim().toUpperCase();
                   }
                }
            }

            if (uLine.startsWith("NAMA")) nama = content.toUpperCase();
            if (uLine.includes("KABUPATEN") || uLine.includes("KOTA")) kab = content;
            if (uLine.includes("KECAMATAN")) kec = content;
            if (uLine.includes("KELURAHAN")) kel = content;

            // Tahun Lahir
            let matchYear = line.match(/\d{4}/);
            if (matchYear && (line.includes("-") || line.includes("/") || uLine.includes("LAKI") || uLine.includes("PEREMPUAN"))) { 
                thn = matchYear[0]; 
            }

            if (uLine.includes("SALDO") || uLine.includes("PENGEMBANGAN") || uLine.includes("JHT")) { 
                let cleanSaldo = line.replace(/[^\d]/g, "");
                if(cleanSaldo && parseInt(cleanSaldo) > parseInt(lasik.replace(/\./g, ""))) { 
                    lasik = formatTitik(cleanSaldo); 
                }
            }

            if (uLine.includes("JUMLAH KARTU")) { 
                let kartuAngka = line.match(/\d+/); // Cari angka di baris tersebut
                if (kartuAngka && parseInt(kartuAngka[0]) > 0) {
                    labelKartu = "SENSOR";
                } else {
                    labelKartu = "TUNGGAL";
                }
            }
        });

        let nikShort = (nik !== "-" && nik.length >= 4) ? nik.substring(0, 4) : nik;
        let kpjShort = (kpj !== "-" && kpj.length >= 4) ? kpj.substring(0, 4).toUpperCase() : kpj;
        
        rawCache = { tg: noTG, nama, nik };

        const iconMap = {
            'ori': { start: '🦆', end: '🦢' },
            '1': { start: '💎', end: '💎' },
            '2': { start: '✨', end: '✨' },
            '3': { start: '🪽', end: '🪽' },
            '4': { start: '🦚', end: '🦚' },
            '5': { start: '🐦‍🔥', end: '🐦‍🔥' }
        };

        const activeIcon = iconMap[sel] || iconMap['ori'];

        let f1 = "";
        if (sel === "ori") {
            f1 = `🦆 ${noTG} 🦢\n\nKabupaten : ${kab}\nKecamatan : ${kec}\nKelurahan : ${kel}\n\n${nikShort}\n${kpjShort}\n${nama}\n${thn}\nPT. \n\nSaldo JHT : Rp. ${lasik}\nTotal Saldo : Rp. ${lasik}\nJumlah Kartu : ${labelKartu}\n\nDPT ✅   JMO ✅`;
        } else if (sel === "1") {
            f1 = `💎 ${noTG} 💎 \n\n🏢 Kab : ${kab}\n🏬 Kec : ${kec}\n🏫 Kel : ${kel}\n🆔 NIK : ${nikShort}\n💳 KPJ : ${kpjShort}\n👫 Nama : ${nama}\n📆 Tanggal Lahir : ${thn}\n🏭 Company : \n\n💲Saldo Utama : Rp. ${lasik}\n💰Total Saldo : Rp. ${lasik}\n🔍Sensor : ${labelKartu}\n\n🎯 Terpercaya ✅ JMO`;
        } else if (sel === "2") {
            f1 = `✨ ${noTG} ✨ \n\nNIK : ${nikShort}\nKPJ : ${kpjShort}\nNama : ${nama}\nTanggal Lahir : ${thn}\n\nKabupaten : ${kab}\nKecamatan : ${kec}\nKelurahan : ${kel}\n\nCompany : \nSaldo JHT : Rp. ${lasik}\nTotal Saldo : Rp. ${lasik}\nSensor : ${labelKartu}\n\n🎯 Terpercaya ✅ JMO`;
        } else if (sel === "3") {
            f1 = `🪽 ${noTG} 🪽 \n\n📝\n★Nama : ${nama}\n★NIK : ${nikShort}\n★KPJ : ${kpjShort}\n★Tanggal Lahir : ${thn}\n★Company : \n💸\n★Saldo Utama : Rp. ${lasik}\n★Total Saldo : Rp. ${lasik}\n★Jenis Kartu : ${labelKartu}\n🏘️\n★Kab : ${kab}\n★Kec : ${kec}\n★Kel : ${kel}\n\n🎯 Terpercaya ✅ JMO`;
        } else if (sel === "4") {
            f1 = `🦚 ${noTG} 🦚\n\n* Kabupaten : ${kab}\n* Kecamatan : ${kec}\n* Kelurahan : ${kel}\n\n* NIK : ${nikShort}\n* KPJ : ${kpjShort}\n* Nama : ${nama}\n* Tanggal Lahir : ${thn}\n* Company : \n\n* Saldo Utama : Rp. ${lasik}\n* Total Saldo : Rp. ${lasik}\n* Sensor : ${labelKartu}\n\n🎯 Terpercaya ✅ JMO`;
        } else if (sel === "5") {
            f1 = `🐦‍🔥 ${noTG} 🐦‍🔥\n\n👥 : ${nama}\n🪪 : ${nikShort}\n💳 : ${kpjShort}\n📆 : ${thn}\n🏭 : \n🏢 : ${kab}\n🏬 : ${kec}\n🏫 : ${kel}\n\n💲 : Rp. ${lasik}\n💰 : Rp. ${lasik}\n🔎 : ${labelKartu}\n\n🎯 Terpercaya ✅ JMO`;
        }

        const f2 = `${activeIcon.start} ${noTG} ${activeIcon.end}\n\nNama: ${nama}\nNIK: ${nik}\nNo. KPJ: ${kpj}\nEmail: \nPassword: Bebek123@ \n\n🖥 Admin OTP : 087778889609`;

        document.getElementById('out1').innerText = f1;
        document.getElementById('out2').innerText = f2;
        btn.style.background = "#06d6a0"; btn.innerHTML = "Success ✨";
        setTimeout(() => { btn.style.background = "linear-gradient(90deg, #4cc9f0, #4361ee)"; btn.innerHTML = "Generate ✨"; }, 1000);
    }

    function sendWA(id, directText = null) {
        let textToSend = directText || document.getElementById(id).innerText;
        if(!textToSend || textToSend.trim() === "") return;
        if (!directText) { saveHistory(rawCache.tg, rawCache.nama, rawCache.nik, document.getElementById('out1').innerText, document.getElementById('out2').innerText); }
        window.open(`https://wa.me/?text=${encodeURIComponent(textToSend)}`, '_blank');
    }

    function saveHistory(tg, nama, nik, f1, f2) {
        let history = JSON.parse(localStorage.getItem('jmo_history') || "[]");
        if (history.length > 0 && history[0].nik === nik) { history[0] = {tg, nama, nik, f1, f2, timestamp: new Date().getTime()}; } 
        else { history.unshift({tg, nama, nik, f1, f2, timestamp: new Date().getTime()}); }
        localStorage.setItem('jmo_history', JSON.stringify(history.slice(0, 50)));
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        const searchTerm = document.getElementById('searchHistory').value.toLowerCase();
        let history = JSON.parse(localStorage.getItem('jmo_history') || "[]");
        let filtered = history.filter(item => (item.nama && item.nama.toLowerCase().includes(searchTerm)) || (item.nik && item.nik.includes(searchTerm)));
        if (filtered.length === 0) { list.innerHTML = "<p style='text-align:center; color:#888; font-size:12px;'>Log Empty..</p>"; return; }
        list.innerHTML = filtered.map((item, index) => {
            const isSelected = selectedNIKs.includes(item.nik);
            return `
            <div class="history-item ${selectedNIKs.length > 0 ? 'selecting' : ''}" 
                 onmousedown="startPress('${item.nik}')" onmouseup="endPress()" onmouseleave="endPress()"
                 ontouchstart="startPress('${item.nik}')" ontouchend="endPress()">
                <div class="history-item-header" onclick="handleItemClick('${item.nik}', ${index})">
                    <div style="display:flex; align-items:center; flex-grow:1; pointer-events: none;">
                        <input type="checkbox" class="select-mode-check" ${isSelected ? 'checked' : ''}>
                        <span class="badge-tg">${item.tg}</span> 
                        <span>${item.nama.substring(0, 15)}</span>
                    </div>
                    <span class="time-ago">${timeAgo(item.timestamp)} ▼</span>
                </div>
                <div id="his-content-${index}" class="history-content">
                    <button class="btn-wa-small" onclick="sendWA(null, \`${item.f1.replace(/`/g, '\\`').replace(/\n/g, '\\n')}\`)">Resend Format 1</button>
                    <button class="btn-wa-small" onclick="sendWA(null, \`${item.f2.replace(/`/g, '\\`').replace(/\n/g, '\\n')}\`)">Resend Format 2</button>
                    <pre>${item.f1}</pre>
                    <pre style="background: #fff; color: #333;">${item.f2}</pre>
                </div>
            </div>`;
        }).join('');
        updateDeleteButton();
    }

    function startPress(nik) {
        pressTimer = window.setTimeout(function() { 
            if (!selectedNIKs.includes(nik)) { selectedNIKs.push(nik); renderHistory(); }
        }, 700);
    }
    function endPress() { clearTimeout(pressTimer); }
    function handleItemClick(nik, index) {
        if (selectedNIKs.length > 0) {
            if (selectedNIKs.includes(nik)) { selectedNIKs = selectedNIKs.filter(id => id !== nik); } 
            else { selectedNIKs.push(nik); }
            renderHistory();
        } else { toggleHistory(index); }
    }
    function updateDeleteButton() {
        const btn = document.getElementById('btn-del-main');
        const label = document.getElementById('history-label');
        if (selectedNIKs.length > 0) {
            btn.innerText = `Delete (${selectedNIKs.length})`;
            btn.style.borderColor = "#ff1f1f"; btn.style.color = "#ff1f1f";
            label.innerText = "Selecting...";
        } else {
            btn.innerText = "Delete";
            btn.style.borderColor = "#ff1f1f"; btn.style.color = "#ff1f1f";
            label.innerText = "History";
        }
    }
    function handleMainDelete() {
        if (selectedNIKs.length > 0) {
            if(confirm(`Delete ${selectedNIKs.length} selected entries?`)) {
                let history = JSON.parse(localStorage.getItem('jmo_history') || "[]");
                let updated = history.filter(item => !selectedNIKs.includes(item.nik));
                localStorage.setItem('jmo_history', JSON.stringify(updated));
                selectedNIKs = [];
                renderHistory();
            }
        } else { if(confirm("Delete All Logs?")) { localStorage.removeItem('jmo_history'); renderHistory(); } }
    }
    function toggleHistory(index) {
        const content = document.getElementById(`his-content-${index}`);
        if(content) { content.style.display = content.style.display === 'block' ? 'none' : 'block'; }
    }
    renderHistory();
    setInterval(renderHistory, 60000);
</script>
</body>
</html>
